<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flamez - Rhyming Rebuttal Bot</title>
    <style>
        /* --- CSS is unchanged --- */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap');
        :root {
            --background-color: #111111; --surface-color: #1a1a1a;
            --primary-color: #FF4500; --secondary-color: #ff8c00;
            --text-primary: #ffffff; --text-secondary: #b3b3b3;
            --user-bubble: #005fff; --ai-bubble: #333333;
            --slash-button-bg: #444444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background-color: var(--background-color); color: var(--text-primary); font-family: 'Roboto', sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; background-color: var(--surface-color); }
        header { padding: 15px 20px; background-color: #0d0d0d; border-bottom: 2px solid var(--primary-color); text-align: center; flex-shrink: 0; }
        header h1 { font-family: 'Bebas+Neue', cursive; font-size: 3rem; letter-spacing: 3px; color: var(--text-primary); text-shadow: 0 0 5px #fff, 0 0 10px var(--secondary-color), 0 0 20px var(--primary-color); }
        header p { color: var(--text-secondary); font-size: 0.9rem; }
        .chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 12px 18px; border-radius: 20px; line-height: 1.5; word-wrap: break-word; opacity: 0; transform: translateY(20px); animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .user-message { background-color: var(--user-bubble); color: var(--text-primary); align-self: flex-end; border-bottom-right-radius: 5px; }
        .ai-message { background-color: var(--ai-bubble); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 5px; }
        .ai-message.welcome-message { background: none; border: 1px dashed var(--text-secondary); color: var(--text-secondary); text-align: center; align-self: center; max-width: 90%; }
        .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; }
        .typing-indicator span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: var(--text-secondary); margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        .chat-form { display: flex; align-items: center; padding: 15px; background-color: #0d0d0d; border-top: 1px solid #333; flex-shrink: 0; gap: 10px; }
        #userInput { flex-grow: 1; padding: 12px 15px; border: 1px solid #444; border-radius: 25px; background-color: #2a2a2a; color: var(--text-primary); font-size: 1rem; outline: none; transition: border-color 0.3s; }
        #userInput:focus { border-color: var(--primary-color); }
        #slashBtn { width: 50px; height: 50px; border: none; border-radius: 50%; background-color: var(--slash-button-bg); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background-color 0.3s, transform 0.2s; flex-shrink: 0; font-size: 1.5rem; font-weight: bold; }
        #slashBtn:hover { background-color: #555555; }
        #slashBtn:active { transform: scale(0.9); }
        #sendBtn { width: 50px; height: 50px; border: none; border-radius: 50%; background-color: var(--primary-color); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background-color 0.3s, transform 0.2s; flex-shrink: 0; }
        #sendBtn:hover { background-color: var(--secondary-color); }
        #sendBtn:active { transform: scale(0.9); }
        #sendBtn svg { width: 24px; height: 24px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header><h1>Flamez</h1><p>Spit Fire. Get Burned.</p></header>
        <main class="chat-window" id="chatWindow">
            <div class="message ai-message welcome-message">This is a dynamic rebuttal bot. To get the best response, write your rap and put a <strong>/</strong> after each bar to mark the count. I'll match your length and use your own words against you.</div>
             <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
        </main>
        <form class="chat-form" id="chatForm">
            <input type="text" id="userInput" placeholder="My flow is fire / I'm the king..." autocomplete="off" required>
            <button type="button" id="slashBtn" aria-label="Add bar separator">/</button>
            <button type="submit" id="sendBtn" aria-label="Send message"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatWindow = document.getElementById('chatWindow');
        const typingIndicator = document.getElementById('typingIndicator');
        const slashBtn = document.getElementById('slashBtn');
        
        // --- NEW: Rhyming Couplet Rebuttal Engine ---

        const rebuttalCouplets = [
            { id: 1, bar1: "You call your [KEYWORD] a punchline? It's more like a light tap,", bar2: "I'm the earthquake that's wiping your name off the map." },
            { id: 2, bar1: "You think your [KEYWORD] is clever, you think that you're so deep,", bar2: "But your bars are so boring they're putting the crowd to sleep." },
            { id: 3, bar1: "All that bragging about your [KEYWORD] is getting incredibly stale,", bar2: "My rhymes are a hurricane, yours are a gentle gale." },
            { id: 4, bar1: "You're hyping up your [KEYWORD] like it's some kind of epic art,", bar2: "But I'll dismantle your ego and tear your whole argument apart." },
            { id: 5, bar1: "You say you're a king with your [KEYWORD], but your crown is just a fake,", bar2: "I'm the certified champ, winning for goodness sake." },
            { id: 6, bar1: "That line about your [KEYWORD] was a shot in the dark,", bar2: "My flow is a wildfire, I'm leaving a permanent mark." },
            { id: 7, bar1: "You're talking about [KEYWORD] like you're some kind of a pro,", bar2: "But your style is outdated, it was cool a decade ago." },
            { id: 8, bar1: "You built your whole career on that one single [KEYWORD] theme,", bar2: "I'm living the reality while you're stuck inside a dream." },
            { id: 9, bar1: "Was that [KEYWORD] bar supposed to be some kind of threat?", bar2: "It's the weakest attempt that I've ever heard yet." },
            { id: 10, bar1: "You're repeating your [KEYWORD] point, it's a predictable plot,", bar2: "While I'm hitting you with punchlines that you totally forgot." }
        ];

        // A list of single, hard-hitting ender bars for odd bar counts.
        const enderBars = [
            "Just pack it up, this battle is done.",
            "So take a seat, the lesson's over now.",
            "Game, set, match, you can't recover from that.",
            "And that's the final nail in your coffin."
        ];

        const stopWords = ['a', 'an', 'the', 'is', 'am', 'are', 'was', 'were', 'i', 'you', 'he', 'she', 'it', 'we', 'they', 'me', 'my', 'your', 'his', 'her', 'its', 'our', 'their', 'and', 'but', 'or', 'so', 'if', 'then', 'in', 'on', 'at', 'to', 'for', 'with', 'of', 'from', 'like'];

        const usedCoupletIds = new Set(); // Session memory for used couplets

        function generateDynamicRebuttal(userText) {
            const userBars = userText.split('/').map(bar => bar.trim()).filter(bar => bar.length > 0);
            let barCount = userBars.length > 0 ? userBars.length : 1;

            let keyword = 'rhymes';
            const allWords = userText.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/);
            const significantWords = allWords.filter(word => !stopWords.includes(word) && word.length > 3);
            if (significantWords.length > 0) {
                keyword = significantWords[Math.floor(Math.random() * significantWords.length)];
            }
            
            const aiResponseBars = [];
            
            // Generate rhyming couplets
            while (barCount >= 2) {
                let availableCouplets = rebuttalCouplets.filter(c => !usedCoupletIds.has(c.id));
                
                // If we run out of unique couplets, reset the memory for this round
                if (availableCouplets.length === 0) {
                    usedCoupletIds.clear(); 
                    availableCouplets = rebuttalCouplets;
                }

                const chosenCouplet = availableCouplets[Math.floor(Math.random() * availableCouplets.length)];
                usedCoupletIds.add(chosenCouplet.id);

                aiResponseBars.push(chosenCouplet.bar1.replace(/\[KEYWORD\]/g, keyword));
                aiResponseBars.push(chosenCouplet.bar2.replace(/\[KEYWORD\]/g, keyword));
                
                barCount -= 2;
            }

            // If there's one bar left to fill, add a random ender
            if (barCount === 1) {
                const ender = enderBars[Math.floor(Math.random() * enderBars.length)];
                aiResponseBars.push(ender);
            }

            return aiResponseBars.join(' / ');
        }
        
        // --- Event Listeners and Display Logic (Unchanged) ---
        slashBtn.addEventListener('click', (event) => { event.preventDefault(); userInput.value += ' / '; userInput.focus(); });
        chatForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const userMessageText = userInput.value.trim();
            if (userMessageText === '') return;
            displayMessage(userMessageText, 'user');
            userInput.value = '';
            typingIndicator.style.display = 'flex';
            scrollToBottom();
            await new Promise(resolve => setTimeout(resolve, 1500));
            const aiResponseText = generateDynamicRebuttal(userMessageText);
            typingIndicator.style.display = 'none';
            displayMessage(aiResponseText, 'ai');
        });
        function displayMessage(text, sender) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', `${sender}-message`);
            messageElement.innerHTML = text.replace(/\//g, '<br>');
            chatWindow.insertBefore(messageElement, typingIndicator);
            scrollToBottom();
        }
        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }
    </script>
</body>
</html>
